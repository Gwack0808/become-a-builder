<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Become a Builder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #fffbf0;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 2.8rem;
      background: linear-gradient(135deg, #f97316, #ec4899, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: #78716c;
      margin-top: 0.5rem;
      font-size: 1.1rem;
    }

    .counter {
      display: inline-block;
      margin-top: 1rem;
      background: white;
      border: 2px solid #fdba74;
      border-radius: 2rem;
      padding: 0.4rem 1.2rem;
      font-size: 0.95rem;
      color: #78716c;
      box-shadow: 3px 3px 0px #fdba74;
    }

    .counter span {
      font-weight: 700;
      color: #f97316;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      perspective: 1000px;
      height: 200px;
      cursor: pointer;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.5s ease;
      border-radius: 1.25rem;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 1.25rem;
      padding: 1.5rem;
      border: 2px solid #e2e8f0;
      box-shadow: 4px 4px 0px #e2e8f0;
    }

    .card-front {
      background: white;
    }

    .card-back {
      background: #1c1917;
      color: white;
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card-back .back-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #a8a29e;
      margin-bottom: 0.5rem;
    }

    .card-back p {
      font-size: 0.95rem;
      line-height: 1.5;
      color: #e7e5e4;
    }

    .card:hover .card-front {
      transform: translate(-2px, -2px);
    }

    .card-icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
    }

    .card-front h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1c1917;
      margin-bottom: 0.5rem;
    }

    .card-front p {
      font-size: 0.95rem;
      color: #57534e;
      line-height: 1.5;
    }

    .card:nth-child(3n+1) .card-front { border-color: #fdba74; box-shadow: 4px 4px 0px #fdba74; }
    .card:nth-child(3n+2) .card-front { border-color: #f9a8d4; box-shadow: 4px 4px 0px #f9a8d4; }
    .card:nth-child(3n+3) .card-front { border-color: #c4b5fd; box-shadow: 4px 4px 0px #c4b5fd; }

    .search {
      display: block;
      margin: 0 auto 2rem;
      width: 100%;
      max-width: 400px;
      padding: 0.65rem 1.2rem;
      font-size: 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 2rem;
      outline: none;
      font-family: inherit;
    }

    .search:focus {
      border-color: #f97316;
      box-shadow: 3px 3px 0px #fdba74;
    }

    .no-results {
      text-align: center;
      color: #a8a29e;
      font-size: 1rem;
      padding: 2rem;
      grid-column: 1 / -1;
    }

    .hint {
      text-align: center;
      margin-top: 2rem;
      color: #a8a29e;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Become a Builder 🛠️</h1>
    <p>Concepts I've learned by building things</p>
    <div class="counter">Cards revealed: <span id="flip-count">0</span> of <span id="total-count"></span></div>
  </header>

  <input class="search" id="search" type="text" placeholder="Search concepts..." />

  <!-- The grid starts empty — JavaScript fills it in -->
  <div class="grid" id="grid"></div>

  <p class="hint">👆 Click any card to flip it</p>

  <script>
    // An ARRAY is an ordered list of things — written with square brackets []
    // An OBJECT is a set of key: value pairs — written with curly braces {}
    // This is an array of objects — the most common data structure in web dev

    const concepts = [
      {
        icon: '📄',
        name: 'HTML',
        description: 'The skeleton of a webpage. Tags describe what things are — a heading, a card, a button.',
        fact: 'HTML was invented by Tim Berners-Lee in 1991. The first webpage is still live at info.cern.ch.'
      },
      {
        icon: '🎨',
        name: 'CSS',
        description: 'The styling layer. CSS controls how things look — colors, fonts, spacing, and layout.',
        fact: 'CSS was proposed in 1994. Before it existed, styling was done with HTML attributes — one reason old sites look so chaotic.'
      },
      {
        icon: '🚢',
        name: 'Shipping',
        description: 'Making something real and putting it somewhere people can see it. The opposite of keeping it on your computer forever.',
        fact: '"Ship it" comes from the physical act of shipping software on disks. Now it just means: make it live.'
      },
      {
        icon: '🌐',
        name: 'GitHub Pages',
        description: 'A free service that takes files in a GitHub repo and serves them as a real website. No server required.',
        fact: 'GitHub Pages has hosted millions of free sites since 2008 — portfolios, docs, games, and tools built by people just like you.'
      },
      {
        icon: '📸',
        name: 'Git',
        description: 'Version control. Every commit is a saved snapshot of your code. Push sends it to GitHub — and live to the world.',
        fact: 'Git was created by Linus Torvalds in 2005 — the same person who created the Linux operating system.'
      },
      {
        icon: '⚡',
        name: 'JavaScript',
        description: 'The behavior layer. JS makes pages respond to the user — clicks, inputs, animations, and live updates.',
        fact: 'JavaScript was written in just 10 days in 1995. Despite the name, it has nothing to do with Java.'
      },
      {
        icon: '📦',
        name: 'Arrays & Objects',
        description: 'The two core ways to store data in JS. Arrays are ordered lists. Objects are key-value pairs.',
        fact: 'Almost every app ever built is just arrays of objects being displayed, filtered, and updated. That\'s it.'
      }
    ];

    // Grab the elements we need
    const grid = document.getElementById('grid');
    const searchInput = document.getElementById('search');
    const countDisplay = document.getElementById('flip-count');
    const totalDisplay = document.getElementById('total-count');
    let flippedCount = 0;

    totalDisplay.textContent = concepts.length;

    function createCard(concept) {
      return `
        <div class="card">
          <div class="card-inner">
            <div class="card-front">
              <div class="card-icon">${concept.icon}</div>
              <h2>${concept.name}</h2>
              <p>${concept.description}</p>
            </div>
            <div class="card-back">
              <div class="back-label">Fun fact</div>
              <p>${concept.fact}</p>
            </div>
          </div>
        </div>
      `;
    }

    // renderCards takes an array and builds the grid from it.
    // It can receive ALL concepts, or a filtered subset — same function either way.
    function renderCards(list) {
      if (list.length === 0) {
        grid.innerHTML = '<p class="no-results">No concepts match that search.</p>';
        return;
      }

      grid.innerHTML = list.map(createCard).join('');

      // Re-attach click listeners every time cards are re-rendered
      flippedCount = 0;
      countDisplay.textContent = 0;

      document.querySelectorAll('.card').forEach(function(card) {
        card.addEventListener('click', function() {
          flipCard(card);
          updateCounter();
        });
      });
    }

    function flipCard(card) {
      card.classList.toggle('flipped');
      if (card.classList.contains('flipped')) {
        flippedCount = flippedCount + 1;
      } else {
        flippedCount = flippedCount - 1;
      }
    }

    function updateCounter() {
      countDisplay.textContent = flippedCount;
      const visibleCards = document.querySelectorAll('.card');
      if (flippedCount === visibleCards.length) {
        showCongrats();
      }
    }

    function showCongrats() {
      document.querySelector('.hint').textContent = '🎉 You\'ve revealed all the concepts!';
    }

    // The 'input' event fires on every keystroke — not just when you press Enter
    searchInput.addEventListener('input', function() {

      // .value reads what's currently typed in the box
      // .toLowerCase() makes the search case-insensitive
      const searchTerm = searchInput.value.toLowerCase();

      // .filter() loops over the array and keeps only items where the
      // function returns true. It returns a brand new array.
      const matches = concepts.filter(function(concept) {
        return concept.name.toLowerCase().includes(searchTerm);
      });

      renderCards(matches);
    });

    // Render all cards on first load
    renderCards(concepts);
  </script>

</body>
</html>
